<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Mobile - Oficial de Justiça TJPE</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
font-family: Arial, sans-serif;
background:#f2f4f7;
margin:0;
padding:15px;
}

h2{
text-align:center;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
margin-bottom:15px;
}

label{
font-size:14px;
font-weight:bold;
}

input, textarea, select, button{
width:100%;
padding:10px;
margin:5px 0;
font-size:15px;
}

button{
background:#2c3e50;
color:white;
border:none;
border-radius:6px;
}

.sigilo{
background:#ffe6f0;
border-left:6px solid #c0392b;
}

.alerta{
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Central Mobile - Mandados</h2>

<div class="card">
<b>📌 Como preencher:</b><br>
• Cole abaixo o texto copiado do PJe OU<br>
• Faça upload de um print do mandado.<br>
O sistema tentará identificar automaticamente processo, parte e datas.
</div>

<div class="card">
<label>Colar texto do PJe</label>
<textarea id="textoPJE" rows="4" placeholder="Cole aqui o conteúdo copiado do PJe..."></textarea>
<button onclick="extrairTexto()">Extrair Dados</button>
</div>

<div class="card">
<label>Importar print (OCR)</label>
<input type="file" accept="image/*" onchange="lerImagem(event)">
<div id="statusOCR"></div>
</div>

<div class="card">
<label>Número do Processo</label>
<input type="text" id="processo">

<label>Nome da Parte</label>
<input type="text" id="parte">

<label>Data de Recebimento</label>
<input type="date" id="recebimento">

<label>Data da Audiência</label>
<input type="date" id="audiencia">

<label>Status</label>
<select id="status">
<option>Pendente</option>
<option>Cumprido</option>
<option>Negativo</option>
<option>Positivo</option>
</select>

<label>Sigilo</label>
<select id="sigilo">
<option value="Nao">Sem Sigilo</option>
<option value="Sim">Violência Doméstica (Sigiloso)</option>
</select>

<button onclick="add()">Salvar Mandado</button>
</div>

<div id="lista"></div>

<script>

let dados = JSON.parse(localStorage.getItem("mandadosMobile")) || [];

function prazo(data){
if(!data) return "-";
let d = new Date(data);
d.setDate(d.getDate()+20);
let hoje = new Date();
return Math.ceil((d-hoje)/(1000*60*60*24));
}

function salvar(){
localStorage.setItem("mandadosMobile", JSON.stringify(dados));
}

function extrairTexto(){
let texto = document.getElementById("textoPJE").value;

let proc = texto.match(/\d{7}-\d{2}\.\d{4}\.\d{1}\.\d{2}\.\d{4}/);
if(proc) processo.value = proc[0];

let data = texto.match(/\d{2}\/\d{2}\/\d{4}/);
if(data) recebimento.value = converterData(data[0]);

let nomeMatch = texto.match(/Requerente:(.*)/i) || texto.match(/Parte:(.*)/i);
if(nomeMatch) parte.value = nomeMatch[1].trim();
}

function converterData(dataBR){
let partes = dataBR.split("/");
return partes[2]+"-"+partes[1]+"-"+partes[0];
}

function lerImagem(event){
let file = event.target.files[0];
document.getElementById("statusOCR").innerText="Lendo imagem...";

Tesseract.recognize(file,'por').then(({ data: { text } })=>{
document.getElementById("textoPJE").value = text;
document.getElementById("statusOCR").innerText="Texto extraído. Clique em 'Extrair Dados'.";
});
}

function add(){
let m = {
processo: processo.value,
parte: parte.value,
recebimento: recebimento.value,
audiencia: audiencia.value,
status: status.value,
sigilo: sigilo.value
};

dados.push(m);
salvar();
render();
}

function render(){
lista.innerHTML="";
dados.forEach(m=>{
let dias = prazo(m.recebimento);
let div = document.createElement("div");
div.className="card";

if(m.sigilo=="Sim"){
div.classList.add("sigilo");
}

div.innerHTML=`
<b>${m.processo}</b><br>
Parte: ${m.parte}<br>
Prazo: ${dias} dias ${dias<0?"<span class='alerta'>(VENCIDO)</span>":""}<br>
Audiência: ${m.audiencia || "-"}<br>
Status: ${m.status}<br>
Sigilo: ${m.sigilo}
`;

lista.appendChild(div);
});
}

render();

</script>

</body>
</html>
