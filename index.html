<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Simplificado - Oficial de Justiça</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f2f4f7;
margin:0;
padding:15px;
}

h2{
text-align:center;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
margin-bottom:15px;
}

input, select, button{
width:100%;
padding:10px;
margin:5px 0;
font-size:16px;
}

button{
background:#2c3e50;
color:white;
border:none;
border-radius:6px;
}

.sigilo{
background:#ffe6f0;
border-left:5px solid #c0392b;
}

.alerta{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<h2>Mandados - IN 04/2023</h2>

<div class="card">
<input type="text" id="processo" placeholder="Processo">
<input type="text" id="parte" placeholder="Parte">
<input type="date" id="recebimento">
<input type="date" id="audiencia">

<select id="status">
<option>Pendente</option>
<option>Cumprido</option>
<option>Negativo</option>
<option>Positivo</option>
</select>

<select id="sigilo">
<option value="Nao">Sem Sigilo</option>
<option value="Sim">Violência Doméstica (Sigiloso)</option>
</select>

<button onclick="add()">Adicionar</button>
</div>

<div id="lista"></div>

<script>

let dados = JSON.parse(localStorage.getItem("mobileMandados")) || [];

function prazo(data){
let d = new Date(data);
d.setDate(d.getDate()+20);
let hoje = new Date();
return Math.ceil((d-hoje)/(1000*60*60*24));
}

function salvar(){
localStorage.setItem("mobileMandados", JSON.stringify(dados));
}

function add(){
let m = {
processo: processo.value,
parte: parte.value,
recebimento: recebimento.value,
audiencia: audiencia.value,
status: status.value,
sigilo: sigilo.value
};

dados.push(m);
salvar();
render();
}

function render(){
lista.innerHTML="";
dados.forEach(m=>{
let dias = prazo(m.recebimento);
let div = document.createElement("div");
div.className="card";

if(m.sigilo=="Sim"){
div.classList.add("sigilo");
}

div.innerHTML=`
<b>${m.processo}</b><br>
Parte: ${m.parte}<br>
Prazo: ${dias} dias ${dias<0?"<span class='alerta'>(VENCIDO)</span>":""}<br>
Audiência: ${m.audiencia || "-"}<br>
Status: ${m.status}<br>
Sigilo: ${m.sigilo}
`;

lista.appendChild(div);
});
}

render();

</script>

</body>
</html>
